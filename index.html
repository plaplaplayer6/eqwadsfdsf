<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Addition Solver</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 80px;
    }
    input {
      width: 300px;
      padding: 10px;
      font-size: 18px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      margin-left: 10px;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 22px;
    }
    #specialLink {
      margin-top: 20px;
      display: none;
      font-size: 20px;
    }
  </style>
</head>
<body>

  <h1>Addition Solver</h1>

  <input id="equation" placeholder="Enter like 1+1" />
  <button onclick="solve()">Solve</button>

  <div id="result"></div>
  <div id="specialLink">
    🎉 You got the answer to the universe. →
    <a id="link" href="#" target="_blank">Click here</a>
  </div>

  <script>
    // 🔧 Change this to your own link
    const YOUR_LINK = "https://example.com";

    function solve() {
      const input = document.getElementById("equation").value.trim();

      // Only allow addition like a+b
      if (!input.includes("+")) {
        document.getElementById("result").innerText = "Only addition is allowed!";
        return;
      }

      const parts = input.split("+");

      if (parts.length !== 2) {
        document.getElementById("result").innerText = "Format must be like 1+1";
        return;
      }

      const a = Number(parts[0].trim());
      const b = Number(parts[1].trim());

      if (isNaN(a) || isNaN(b)) {
        document.getElementById("result").innerText = "Please enter valid numbers!";
        return;
      }

      const sum = a + b;

      document.getElementById("result").innerText = "Result: " + sum;

      if (sum === 42) {
        const linkBox = document.getElementById("specialLink");
        const link = document.getElementById("link");

        link.href = YOUR_LINK;
        linkBox.style.display = "block";
      } else {
        document.getElementById("specialLink").style.display = "none";
      }
    }
  </script>

</body>
</html>
